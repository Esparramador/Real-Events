<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Events </title>
    <link rel="stylesheet" href="style.css">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
    <nav>
        <a href="index.html" class="logo-link">
            <img id="web-logo" src="logo.png" alt="Logo Real Events" class="logo-img">
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="sobre-mi.html">Sobre Amal</a></li>
            <li><a href="servicios.html">Servicios</a></li>
            <li><a href="portfolio.html">Bodas Reales</a></li> <li><a href="contacto.html" class="btn">Contacto</a></li>
        </ul>
    </nav>

    <header id="hero-section" class="hero" style="background: #333;">
        <div class="hero-content">
            <h1 id="hero-title">Cargando...</h1>
            <p id="hero-sub">Cargando experiencia...</p>
            <a href="contacto.html" class="btn" id="hero-btn">Reserva tu fecha</a>
        </div>
    </header>

    <section class="about-preview">
        <div class="container">
            <h2 id="about-title" class="section-title">Nuestra Esencia</h2>
            <div id="about-desc" style="max-width: 800px; margin: 0 auto; color: #555;">
                </div>
        </div>
    </section>

    <footer>
        <h2 class="footer-brand">Real Events</h2>
        <p class="footer-byline">by Amal</p>
    </footer>

    <script>
        fetch('index.json')
            .then(response => response.json())
            .then(data => {
                // Rellenamos el diseño con los datos de Decap CMS
                if(data.logo) document.getElementById('web-logo').src = data.logo;
                document.getElementById('hero-title').innerText = data.hero_title;
                document.getElementById('hero-sub').innerText = data.hero_sub;
                document.getElementById('hero-btn').innerText = data.cta_text;
                document.getElementById('about-title').innerText = data.about_title;
                document.getElementById('about-desc').innerHTML = marked.parse(data.about_desc); // Asume que cargaremos un lector de markdown luego
                
                // Fondo
                if(data.hero_bg) {
                    document.getElementById('hero-section').style.backgroundImage = `linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('${data.hero_bg}')`;
                    document.getElementById('hero-section').style.backgroundSize = 'cover';
                    document.getElementById('hero-section').style.backgroundPosition = 'center';
                }
            })
            .catch(error => console.log('Primero guarda los datos en el CMS para que aparezcan aquí.'));
            
        // Redirección Login
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) { window.netlifyIdentity.on("login", () => { document.location.href = "/admin/"; }); }
            });
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</body>
</html>
