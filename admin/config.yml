backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "paginas"
    label: "Páginas Principales"
    files:
      - file: "index.json"
        label: "Página de Inicio"
        name: "home"
        fields:
          - {label: "Logo de la Web", name: "logo", widget: "image"}
          - {label: "Título Principal Hero", name: "hero_title", widget: "string"}
          - {label: "Subtítulo Hero", name: "hero_sub", widget: "text"}
          - {label: "Imagen de Fondo Hero", name: "hero_bg", widget: "image"}
          - {label: "Texto del Botón", name: "cta_text", widget: "string"}
          - {label: "Título Sección Esencia", name: "about_title", widget: "string"}
          - {label: "Texto Nuestra Esencia", name: "about_desc", widget: "markdown"}

      - file: "sobre-mi.json"
        label: "Sobre Amal"
        name: "about"
        fields:
          - {label: "Título", name: "title", widget: "string"}
          - {label: "Tu Foto", name: "profile_img", widget: "image"}
          - {label: "Tu Biografía", name: "bio", widget: "markdown"}

      - file: "servicios.json"
        label: "Servicios"
        name: "services"
        fields:
          - {label: "Título Página", name: "title", widget: "string"}
          - label: "Lista de Servicios"
            name: "servicios_list"
            widget: "list"
            fields:
              - {label: "Nombre", name: "nombre", widget: "string"}
              - {label: "Descripción", name: "desc", widget: "text"}
              - {label: "Imagen", name: "img", widget: "image"}

      # --- NUEVO: CONTACTO ---
      - file: "contacto.json"
        label: "Página de Contacto"
        name: "contact"
        fields:
          - {label: "Título", name: "title", widget: "string"}
          - {label: "Texto de introducción", name: "desc", widget: "markdown"}
          - {label: "Email", name: "email", widget: "string"}
          - {label: "Teléfono", name: "phone", widget: "string"}

      # --- NUEVO: TIENDA ---
      - file: "tienda.json"
        label: "Página de Tienda"
        name: "shop"
        fields:
          - {label: "Título Principal", name: "title", widget: "string"}
          - {label: "Mensaje (Ej: Próximamente)", name: "message", widget: "markdown"}

  - name: "eventos"
    label: "Bodas y Eventos (Galería)"
    folder: "eventos"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    fields:
      - {label: "Nombre de los Novios / Evento", name: "title", widget: "string"}
      - {label: "Fecha", name: "date", widget: "datetime"}
      - {label: "Tipo", name: "tipo", widget: "select", options: ["Boda", "Preboda", "Baby Shower", "Corporativo", "Otro"]}
      - {label: "Foto Principal", name: "thumbnail", widget: "image"}
      - label: "Galería de Fotos"
        name: "galeria"
        widget: "list"
        fields:
          - {label: "Foto", name: "foto", widget: "image"}
          - {label: "Pie de foto (Opcional)", name: "alt", widget: "string", required: false}
      - {label: "Descripción", name: "body", widget: "markdown"}
