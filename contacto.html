<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Real Events</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo-link"><img src="logo.png" alt="Logo" class="logo-img"></a>
        <ul class="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="sobre-mi.html">Sobre Amal</a></li>
            <li><a href="servicios.html">Servicios</a></li>
            <li><a href="portfolio.html">Bodas Reales</a></li>
            <li><a href="contacto.html" class="btn">Contacto</a></li>
        </ul>
    </nav>

    <section style="padding: 5rem 5%; text-align: center; min-height: 60vh;">
        <h1 id="page-title" style="font-family: 'Playfair Display', serif; color: #C87A61;">Cargando...</h1>
        <div id="contact-desc" style="max-width: 600px; margin: 1rem auto; color: #555;"></div>
        
        <div style="margin-top: 3rem; background: #FCFBF9; padding: 2rem; border-radius: 8px; display: inline-block;">
            <p style="font-size: 1.2rem; margin-bottom: 1rem;"><strong>Email:</strong> <a id="contact-email" href="#" style="color: #9CA986; text-decoration: none;">Cargando...</a></p>
            <p style="font-size: 1.2rem;"><strong>Teléfono:</strong> <span id="contact-phone">Cargando...</span></p>
        </div>
    </section>

    <footer>
        <h2 class="footer-brand">Real Events</h2>
        <p class="footer-byline">by Amal</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        fetch('contacto.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('page-title').innerText = data.title;
                document.getElementById('contact-desc').innerHTML = marked.parse(data.desc || '');
                document.getElementById('contact-email').innerText = data.email;
                document.getElementById('contact-email').href = "mailto:" + data.email;
                document.getElementById('contact-phone').innerText = data.phone;
            })
            .catch(error => console.log('Publica la página de Contacto en el admin para verla.'));
    </script>
</body>
</html>
