<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicios | Real Events</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo-link"><img src="logo.png" alt="Logo" class="logo-img"></a>
        <ul class="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="sobre-mi.html">Sobre Amal</a></li>
            <li><a href="servicios.html">Servicios</a></li>
            <li><a href="portfolio.html">Bodas Reales</a></li>
            <li><a href="contacto.html" class="btn">Contacto</a></li>
        </ul>
    </nav>

    <section style="padding: 5rem 5%; text-align: center;">
        <h1 id="page-title">Cargando Servicios...</h1>
        
        <div id="services-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; margin-top: 3rem;">
        </div>
    </section>

    <footer>
        <h2 class="footer-brand">Real Events</h2>
        <p class="footer-byline">by Amal</p>
    </footer>

    <script>
        fetch('servicios.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('page-title').innerText = data.title;
                
                const grid = document.getElementById('services-grid');
                if(data.servicios_list) {
                    data.servicios_list.forEach(servicio => {
                        grid.innerHTML += `
                            <div style="background: #FCFBF9; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                                ${servicio.img ? `<img src="${servicio.img}" style="width: 100%; height: 200px; object-fit: cover; border-radius: 4px; margin-bottom: 1rem;">` : ''}
                                <h3 style="font-family: 'Playfair Display', serif; color: #C87A61;">${servicio.nombre}</h3>
                                <p style="color: #666; margin-top: 1rem;">${servicio.desc}</p>
                            </div>
                        `;
                    });
                }
            })
            .catch(error => console.log('Debes publicar la página desde el panel de admin primero.'));
    </script>
</body>
</html>
