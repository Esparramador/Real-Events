<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobre Amal | Real Events</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo-link"><img src="logo.png" alt="Logo" class="logo-img"></a>
        <ul class="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="sobre-mi.html">Sobre Amal</a></li>
            <li><a href="servicios.html">Servicios</a></li>
            <li><a href="portfolio.html">Bodas Reales</a></li>
            <li><a href="contacto.html" class="btn">Contacto</a></li>
        </ul>
    </nav>

    <section class="about-page" style="padding: 5rem 5%; text-align: center;">
        <h1 id="page-title">Cargando...</h1>
        <img id="profile-img" src="" alt="Amal" style="width: 200px; height: 200px; border-radius: 50%; object-fit: cover; margin: 2rem auto; display: none;">
        <div id="bio-content" style="max-width: 800px; margin: 0 auto; text-align: left; line-height: 1.8;"></div>
    </section>

    <footer>
        <h2 class="footer-brand">Real Events</h2>
        <p class="footer-byline">by Amal</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        fetch('sobre-mi.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('page-title').innerText = data.title;
                if(data.profile_img) {
                    document.getElementById('profile-img').src = data.profile_img;
                    document.getElementById('profile-img').style.display = 'block';
                }
                document.getElementById('bio-content').innerHTML = marked.parse(data.bio);
            })
            .catch(error => console.log('Debes publicar la página desde el panel de admin primero.'));
    </script>
</body>
</html>
