<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda | Real Events</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo-link"><img src="logo.png" alt="Logo" class="logo-img"></a>
        <ul class="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="sobre-mi.html">Sobre Amal</a></li>
            <li><a href="servicios.html">Servicios</a></li>
            <li><a href="portfolio.html">Bodas Reales</a></li>
            <li><a href="contacto.html" class="btn">Contacto</a></li>
        </ul>
    </nav>

    <section style="padding: 8rem 5%; text-align: center; min-height: 60vh;">
        <h1 id="shop-title" style="font-family: 'Playfair Display', serif; font-size: 3rem; color: #9CA986;">Cargando...</h1>
        <div id="shop-message" style="max-width: 600px; margin: 2rem auto; font-size: 1.2rem; color: #666;"></div>
    </section>

    <footer>
        <h2 class="footer-brand">Real Events</h2>
        <p class="footer-byline">by Amal</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        fetch('tienda.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('shop-title').innerText = data.title;
                document.getElementById('shop-message').innerHTML = marked.parse(data.message || '');
            })
            .catch(error => console.log('Publica la página de Tienda en el admin para verla.'));
    </script>
</body>
</html>
